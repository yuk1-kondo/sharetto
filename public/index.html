<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#faf9f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <title>シェアっと - ファイル共有</title>
  <link rel="stylesheet" href="css/design-tokens.css">
  <link rel="stylesheet" href="css/sharetto-app.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="sharetto-app" data-connection-state="idle">
  <div id="mainContent" class="app">
    <header class="app-header">
      <div class="app-header__inner">
        <div class="app-header__row">
          <div class="app-brand">
            <h1>シェアっと</h1>
            <p>スマホからPCへ、すぐ転送</p>
          </div>
          <a href="/join.html" class="btn btn--ghost btn--sm">参加</a>
        </div>
        <div class="status-panel">
          <p class="status-panel__title">接続状態</p>
          <div class="status-panel__row">
            <span id="connectionBadge" class="connection-badge" data-state="idle">準備中</span>
            <span id="connectionDetail" class="connection-detail"></span>
            <div id="sessionTimer" class="session-timer" style="display:none">
              <div class="timer-text">
                <span class="timer-icon">⏰</span>
                <span id="timerDisplay">10:00</span>
              </div>
              <span class="timer-detail">10分後に自動削除</span>
            </div>
          </div>
          <div id="connection-visual" class="connection-visual" aria-hidden="true"></div>
          <div class="connection-progress-track"><div id="connectionProgress" class="connection-progress-bar" hidden></div></div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <aside class="app-sidebar">
        <div class="card">
          <p class="card__label">Transfer Mode</p>
          <div class="mode-tabs transfer-mode-tabs">
            <button type="button" class="tab-button active" data-transfer-mode="p2p">直接接続</button>
            <button type="button" class="tab-button" data-transfer-mode="relay">サーバー経由</button>
          </div>
          <p id="relayModeNote" class="mode-hint" hidden>サーバー経由は確実ですが速度は遅め。NAT越えできない場合のフォールバックにも使えます。</p>

          <p class="card__title">スマホを接続</p>
          <div class="qr-frame">
            <div id="qrcode" class="qr-display"></div>
          </div>

          <div class="join-block join-code-display">
            <div class="join-block__label join-code-display__label">参加コード</div>
            <div id="joinCode" class="join-code-display__code">------</div>
          </div>
          <div class="btn-row" style="margin-bottom:12px">
            <button id="copyJoinCodeBtn" type="button" class="action-button btn--sm" disabled>コードをコピー</button>
          </div>

          <p class="qr-url" id="qrUrl"></p>
          <div class="btn-row">
            <button type="button" onclick="copyQRUrl()" class="action-button btn--ghost btn--sm">URLコピー</button>
            <button type="button" onclick="shareToPhone()" class="action-button btn--ghost btn--sm">スマホに送る</button>
          </div>
          <div class="btn-row" style="margin-top:8px">
            <button type="button" onclick="generateNewSession()" class="action-button btn--block">新しいQRを発行</button>
          </div>
        </div>
      </aside>

      <section class="app-content">
        <div class="card" id="pcSendPanel" hidden>
          <p class="card__label">Send to Phone</p>
          <p style="font-size:13px;color:var(--st-muted);margin-bottom:12px">直接接続中のみ</p>
          <textarea id="pcTextSend" class="url-input" rows="2" placeholder="テキストを入力" style="margin-bottom:12px"></textarea>
          <div class="btn-row">
            <button id="pcTextSendBtn" type="button" class="action-button">テキスト送信</button>
            <button id="pcFileSendBtn" type="button" class="action-button btn--ghost">ファイル送信</button>
            <input type="file" id="pcFileSend" hidden>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <h3>受信ファイル</h3>
            <div class="toolbar__actions">
              <button id="downloadZipBtn" type="button" onclick="downloadZip()" class="action-button btn--ghost" disabled>ZIP</button>
              <button type="button" onclick="refreshFiles()" class="action-button btn--ghost">更新</button>
            </div>
          </div>
          <div id="filesList" class="files-list">
            <div class="no-files">まだファイルがありません<br><small>QRを読み取るとここに表示されます</small></div>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <h3>URL・テキスト</h3>
            <button type="button" onclick="refreshFiles()" class="action-button btn--ghost">更新</button>
          </div>
          <div id="urlsList" class="files-list">
            <div class="no-files">URLやテキストはここに表示されます</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">シェアっと · Develop by YUKI KONDO</footer>
  </div>

  <!-- 画像プレビューモーダル -->
  <div id="imageModal" class="image-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeImageModal()">×</button>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">画像プレビュー</div>
      </div>
      <img id="modalImage" class="modal-image" src="" alt="">
      <div class="modal-actions">
        <button class="modal-btn" onclick="downloadModalImage()">⬇️ ダウンロード</button>
        <button class="modal-btn" onclick="closeImageModal()">✕ 閉じる</button>
      </div>
    </div>
  </div>

  <!-- QRコード生成ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script type="module" src="./js/pages/pc-view.js"></script>
</body>
</html>
