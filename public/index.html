<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <title>シェアっと - ファイル共有</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/app-layout.css">
  <link rel="stylesheet" href="css/three-ui.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Liquid Glass Components */
    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.1),
        0 4px 16px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      max-width: 600px;
      margin: 20px auto;
    }
    
    .glass-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.6), 
        transparent);
      animation: shimmer 3s linear infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    /* 認証システム用スタイル */
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .auth-container {
      background: rgba(255, 255, 255, 0.15);
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 32px;
      padding: 48px;
      box-shadow: 
        0 16px 64px rgba(0, 0, 0, 0.2),
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      text-align: center;
      max-width: 90%;
      width: 420px;
      position: relative;
      overflow: hidden;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .auth-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, 
        transparent, 
        rgba(255, 255, 255, 0.1), 
        transparent 120deg);
      animation: rotate 8s linear infinite;
    }
    
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }
    
    .auth-title {
      font-size: 28px;
      margin-bottom: 16px;
      color: #111111;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    
    .auth-subtitle {
      font-size: 16px;
      margin-bottom: 32px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    
    .auth-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      font-size: 16px;
      color: white;
      margin-bottom: 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    .auth-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .auth-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }
    
    .auth-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.2), 
        rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    
    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
    }
    
    .auth-error {
      display: none;
      color: #ff6b6b;
      margin-top: 16px;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }
    
    .auth-info {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
      z-index: 1;
    }
    
    /* ログアウトボタン */
    .logout-btn {
      max-width: 200px;
      margin: 16px auto;
      padding: 12px;
      font-size: 14px;
      opacity: 0.8;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: block;
    }
    
    /* 画面切り替え用スタイル */
    .hidden-screen {
      display: none;
    }
    
    .back-button {
      margin-top: 16px;
      padding: 12px 24px;
      font-size: 14px;
    }
    
    .main-content {
      display: block;
      padding: 20px;
    }
    
    /* Header */
    .header { text-align: center; margin-bottom: 40px; }
    .topbar { position: sticky; top: 0; z-index: 100; padding: 12px 16px; }
    .topbar-inner { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    
    .header h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #111111;
    }
    
    .header p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }
    
    /* Tab Container */
    .tab-container {
      display: flex;
      margin-bottom: 32px;
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .tab-button {
      flex: 1;
      padding: 16px 12px;
      background: transparent;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      color: rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
    }
    
    .tab-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.15), 
        rgba(255, 255, 255, 0.05));
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .tab-button.active {
      color: white;
      transform: scale(1.05);
    }
    
    .tab-button.active::before {
      opacity: 1;
    }
    
    .tab-button:not(.active):hover {
      color: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Upload Area */
    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.05);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .upload-area:hover, .upload-area.dragover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.1);
    }
    
    .upload-icon {
      font-size: 64px;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.6);
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
    
    .upload-area p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      line-height: 1.5;
    }
    
    .file-input {
      display: none;
    }
    
    /* File Preview */
    .file-preview {
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    
    .file-name {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-all;
    }
    
    .file-size {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    
    /* Progress Bar */
    .progress-container {
      display: none;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    /* Buttons */
    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      width: 100%;
      margin: 10px 0;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, 
        rgba(79, 172, 254, 0.8), 
        rgba(0, 242, 254, 0.8));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Status */
    .status {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }
    
    .status.success {
      color: #4ade80;
    }
    
    .status.error {
      color: #f87171;
    }
    
    /* URL Input */
    .url-input-container {
      margin: 20px 0;
    }
    
    .url-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      font-size: 16px;
      color: white;
      margin-bottom: 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .url-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }
    
    .url-preview {
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    
    .url-preview.show {
      display: block;
    }
    
    .url-preview-title {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .url-preview-description {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    
    .url-preview-url {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      word-break: break-all;
      font-family: monospace;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    
    .footer small {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
      display: block;
    }
    
    /* QR Code Section */
    .qr-section {
      text-align: center;
      padding: 20px 0;
    }
    
    .qr-header {
      margin-bottom: 40px;
    }
    
    .qr-header h3 {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    .qr-header p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      line-height: 1.5;
    }
    
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    
    .qr-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      padding: 20px;
    }
    
    .qr-display canvas {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 
        0 12px 48px rgba(0, 0, 0, 0.15),
        0 6px 24px rgba(0, 0, 0, 0.1);
      animation: float 4s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .qr-info {
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 24px;
      min-width: 300px;
    }
    
    .qr-url {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 16px;
      word-break: break-all;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
      border-radius: 12px;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 10px;
    }
    
    /* QRアクションボタン用スタイル */
    .qr-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .action-button {
      background: rgba(255, 255, 255, 0.15);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      color: rgba(255, 255, 255, 0.9);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 140px;
      justify-content: center;
    }
    
    .action-button:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }
    
    .action-button:active {
      transform: translateY(0);
    }
    
    /* ファイル表示セクション */
    .files-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .files-header h3 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 20px;
      font-weight: 600;
      margin: 0;
    }
    
    .files-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .no-files {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      padding: 40px 20px;
      font-style: italic;
    }
    
    .file-item, .url-item {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }
    
    .file-item:hover, .url-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .file-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    
    .file-details {
      flex: 1;
    }
    
    .file-name {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 4px;
      word-break: break-all;
    }
    
    .file-meta {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      display: flex;
      gap: 16px;
    }

    .file-size, .file-date {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 2px;
    }
    
    .file-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 120px;
    }
    
    .download-btn {
      background: rgba(79, 172, 254, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      text-align: center;
      min-width: 100px;
    }
    
    .download-btn:hover {
      background: rgba(79, 172, 254, 1);
      transform: translateY(-1px);
    }
    
    .url-link {
      color: rgba(79, 172, 254, 0.9);
      text-decoration: none;
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
    }
    
    .url-link:hover {
      color: rgba(79, 172, 254, 1);
      text-decoration: underline;
    }
    
    /* 画像サムネイル関連 */
    .file-thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      margin-right: 16px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .file-thumbnail:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .file-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    
    .view-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin-right: 0;
    }
    
    .view-btn:hover {
      background: linear-gradient(135deg, #5a6fd8, #6a4190);
    }
    
    /* フルサイズ画像プレビューモーダル */
    .image-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .image-modal.show {
      display: flex;
    }
    
    .modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .modal-image {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }
    
    .modal-header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .modal-title {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    /* セッションタイマーUI */
    .session-timer {
      /* Start in blue; JS adds .warning (yellow) and .critical (red) later */
      background: linear-gradient(135deg, rgba(52, 120, 246, 0.95), rgba(33, 87, 243, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 12px 20px;
      margin: 16px 0;
      text-align: center;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(52, 120, 246, 0.3);
      animation: pulse-timer 2s infinite;
    }

    .session-timer.warning {
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.9), rgba(255, 152, 0, 0.9));
      animation: flash-warning 1s infinite;
    }

    .session-timer.critical {
      background: linear-gradient(135deg, rgba(220, 53, 69, 0.9), rgba(255, 107, 107, 0.9));
      animation: flash-critical 0.5s infinite;
    }

    @keyframes pulse-timer {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes flash-warning {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes flash-critical {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .timer-text {
      font-size: 18px;
      margin-bottom: 4px;
      color: #fff;
    }

    .timer-detail {
      font-size: 13px;
      color: #fff;
      opacity: 1;
    }

    .timer-icon {
      font-size: 20px;
      margin-right: 8px;
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    
    .modal-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .modal-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }
    
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .glass-container {
        margin: 10px;
        padding: 24px;
      }
      
      .header h1 {
        font-size: 32px;
      }
      
      .auth-container {
        padding: 32px 24px;
        width: 95%;
      }
      
      .upload-area {
        padding: 40px 20px;
      }
      
      .upload-icon {
        font-size: 48px;
      }
      
      .tab-button {
        font-size: 14px;
        padding: 12px 8px;
      }
    }
  /* Apple-like design tokens and overrides */
  :root {
    --accent: #0a84ff;
    --accent-pressed: #0066cc;
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.72);
    --border: rgba(255, 255, 255, 0.16);
    --border-strong: rgba(255, 255, 255, 0.24);
    --surface: rgba(255, 255, 255, 0.10);
    --radius-lg: 20px;
    --radius-xl: 24px;
  }

  body {
    background: linear-gradient(180deg, #0b0f14, #11151b);
    color: var(--text-primary);
  }

  .glass-container { background: var(--surface); border-color: var(--border); border-radius: var(--radius-xl); }
  .auth-title { color: var(--text-primary); -webkit-text-fill-color: unset; background: none; }
  .auth-input { background: var(--surface); border-color: var(--border); color: var(--text-primary); }
  .auth-input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 4px rgba(10,132,255,.15); transform: none; }
  .auth-button, .btn-primary, .action-button, .download-btn { background: var(--accent); border-color: transparent; color: #fff; }
  .auth-button:hover, .btn-primary:hover, .action-button:hover, .download-btn:hover { background: var(--accent-pressed); }
  .header h1 { -webkit-text-fill-color: unset; background: none; color: var(--text-primary); }
  .file-item, .url-item { background: rgba(255,255,255,0.08); border-color: var(--border); }
  .url-link { color: var(--accent); }
  </style>
  <!-- Material theme overrides: fixed light scheme (no dark switch) -->
  <style>
    :root { --md-bg:#f6f7f9; --md-surface:#ffffff; --md-surface-variant:#f2f4f7; --md-outline:#d0d7e2; --md-outline-variant:#e3e8f1; --md-on-bg:#111111; --md-on-surface:#111111; --md-on-surface-variant:#4a5568; --md-primary:#ffb300; --md-primary-pressed:#ff8f00; }
    body { background: var(--md-bg) !important; color: var(--md-on-bg); color-scheme: light; }
    .glass-container, .auth-container { background: var(--md-surface) !important; border:1px solid var(--md-outline-variant) !important; }
    .auth-button, .action-button, .btn, .download-btn { background: var(--md-primary) !important; color:#fff !important; border-color: transparent !important; }
    .auth-button:hover, .action-button:hover, .btn:hover, .download-btn:hover { background: var(--md-primary-pressed) !important; }
    .header h1, .files-header h3, .qr-header h3 { color: var(--md-on-surface) !important; }
    .file-item, .url-item { background: var(--md-surface-variant) !important; border:1px solid var(--md-outline) !important; }
    .auth-subtitle, .header p, .qr-header p, .file-meta, .file-size, .file-date, .auth-info, .status { color: var(--md-on-surface-variant) !important; }
    .url-link { color: var(--md-primary) !important; }
  </style>
  <style>
  /* Legacy tokens remapped to fixed light scheme */
  :root {
    --bg-start: var(--md-bg);
    --bg-end: var(--md-bg);
    --surface: var(--md-surface);
    --border: var(--md-outline-variant);
    --border-strong: var(--md-outline);
    --text-primary: var(--md-on-surface);
    --text-secondary: var(--md-on-surface-variant);
    --accent: var(--md-primary);
    --accent-pressed: var(--md-primary-pressed);
    --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
    --shadow-elev: 0 8px 24px rgba(0,0,0,0.08);
  }
  body { background: linear-gradient(180deg, var(--bg-start), var(--bg-end)); color: var(--text-primary); line-height: 1.5; }
  .glass-container { background: var(--surface); border-color: var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-elev); }
  .header h1 { color: var(--text-primary); -webkit-text-fill-color: initial; background: none; }
  .header p { color: var(--text-secondary); }
  .files-header h3, .qr-header h3 { color: var(--text-primary); }
  .qr-header p { color: var(--text-secondary); }
  /* Inputs */
  .auth-input, .session-input, .url-input { background: var(--surface); border-color: var(--border); color: var(--text-primary); }
  .auth-input::placeholder, .session-input::placeholder, .url-input::placeholder { color: var(--text-secondary); }
  .auth-input:focus, .session-input:focus, .url-input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 4px rgba(10,132,255,.15); transform: none; }
  /* Buttons */
  .btn, .auth-button, .action-button, .download-btn { min-height: 44px; padding: 12px 16px; border-radius: var(--radius-lg); background: var(--accent); border: 1px solid transparent; color: #fff; }
  .btn:hover, .auth-button:hover, .action-button:hover, .download-btn:hover { background: var(--accent-pressed); transform: none; box-shadow: none; }
  .btn:disabled, .auth-button:disabled, .action-button:disabled, .download-btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn:focus-visible, .auth-button:focus-visible, .action-button:focus-visible, .download-btn:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(10,132,255,.25); }
  /* Items */
  .file-item, .url-item { background: var(--surface); border-color: var(--border); }
  .file-meta, .file-size, .file-date { color: var(--text-secondary); }
  .url-link { color: var(--accent); }
  /* Reduce playful motion */
  .upload-area:hover, .tab-button:not(.active):hover { transform: none; box-shadow: none; }
  </style>

<body class="has-3d-scene" data-connection-state="idle">
  <div id="scene-bg" aria-hidden="true"></div>
  <div id="mainContent" class="main-content">
    <header class="orbital-header">
      <div class="orbital-header__top">
        <div class="orbital-header__brand">
          <h1>シェアっと</h1>
          <div class="orbital-header__tagline">Orbital Link — スマホからPCへ、すぐ転送</div>
        </div>
        <a href="/join.html" class="action-button">参加</a>
      </div>
      <div class="status-ribbon">
        <span id="connectionBadge" class="connection-badge" data-state="idle">準備中</span>
        <span id="connectionDetail" class="connection-detail"></span>
        <div id="sessionTimer" class="session-timer" style="display:none">
          <div class="timer-text">
            <span class="timer-icon">⏰</span>
            <span id="timerDisplay">10:00</span>
          </div>
          <div class="timer-detail">ファイルは自動的に削除されます</div>
        </div>
        <div class="connection-progress-track"><div id="connectionProgress" class="connection-progress-bar" hidden></div></div>
      </div>
    </header>

    <div class="orbital-stage">
      <aside class="orbital-dock orbital-dock--connect">
        <div class="glass-panel">
          <p class="glass-panel__title">Transfer Mode</p>
          <div class="orbital-tabs transfer-mode-tabs">
            <button type="button" class="tab-button active" data-transfer-mode="p2p">直接接続</button>
            <button type="button" class="tab-button" data-transfer-mode="relay">サーバー経由</button>
          </div>
          <p id="relayModeNote" class="mode-hint" hidden>サーバー経由は確実ですが速度は遅め。NAT越えできない場合のフォールバックにも使えます。</p>

          <p class="glass-panel__title glass-panel__title--large">スマホを接続</p>
          <div class="qr-orbit-frame">
            <div id="qrcode" class="qr-display"></div>
          </div>

          <div class="join-code-display">
            <div class="join-code-display__label">参加コード</div>
            <div id="joinCode" class="join-code-display__code">------</div>
          </div>
          <div class="join-code-actions" style="margin-bottom:12px">
            <button id="copyJoinCodeBtn" type="button" class="action-button" disabled>コードをコピー</button>
          </div>

          <p class="qr-url" id="qrUrl"></p>
          <div class="qr-actions">
            <button onclick="copyQRUrl()" class="action-button">URLコピー</button>
            <button onclick="shareToPhone()" class="action-button">スマホに送る</button>
            <button onclick="generateNewSession()" class="action-button">新しいQR</button>
          </div>
        </div>
      </aside>

      <main class="orbital-dock orbital-dock--inbox">
        <div class="glass-panel inbox-panel" id="pcSendPanel" hidden style="margin-bottom:16px">
          <p class="glass-panel__title">Send to Phone</p>
          <p style="font-size:12px;color:var(--orb-text-muted);margin-bottom:10px">直接接続中のみ</p>
          <textarea id="pcTextSend" class="url-input" rows="2" placeholder="テキストを入力" style="width:100%;margin-bottom:10px;resize:vertical"></textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button id="pcTextSendBtn" type="button" class="action-button">テキスト送信</button>
            <button id="pcFileSendBtn" type="button" class="action-button">ファイル送信</button>
            <input type="file" id="pcFileSend" hidden>
          </div>
        </div>

        <div class="glass-panel inbox-panel" style="margin-bottom:16px">
          <div class="receive-toolbar">
            <h3>受信ファイル</h3>
            <div class="receive-toolbar__actions">
              <button id="downloadZipBtn" type="button" onclick="downloadZip()" class="action-button" disabled>ZIP</button>
              <button onclick="refreshFiles()" class="action-button">更新</button>
            </div>
          </div>
          <div id="filesList" class="files-list">
            <div class="no-files">まだファイルがありません<br><small>QRを読み取るとここに表示されます</small></div>
          </div>
        </div>

        <div class="glass-panel inbox-panel">
          <div class="receive-toolbar">
            <h3>URL・テキスト</h3>
            <button onclick="refreshFiles()" class="action-button">更新</button>
          </div>
          <div id="urlsList" class="files-list">
            <div class="no-files">URLやテキストはここに表示されます</div>
          </div>
        </div>
      </main>
    </div>

    <footer class="orbital-footer">シェアっと · Develop by YUKI KONDO</footer>
  </div>

  <!-- 画像プレビューモーダル -->
  <div id="imageModal" class="image-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeImageModal()">×</button>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">画像プレビュー</div>
      </div>
      <img id="modalImage" class="modal-image" src="" alt="">
      <div class="modal-actions">
        <button class="modal-btn" onclick="downloadModalImage()">⬇️ ダウンロード</button>
        <button class="modal-btn" onclick="closeImageModal()">✕ 閉じる</button>
      </div>
    </div>
  </div>

  <!-- QRコード生成ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script type="module" src="./js/pages/pc-view.js"></script>
</body>
</html>
