<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf9f5" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <title>参加コードで参加 - シェアっと</title>
  <link rel="stylesheet" href="css/design-tokens.css" />
  <link rel="stylesheet" href="css/sharetto-app.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body class="sharetto-app">
  <div class="page-center">
    <div class="card page-card">
      <p class="card__label">Join</p>
      <h1 class="card__title">参加コード</h1>
      <p class="page-lead">6桁のコード、または共有URLを入力してセッションに参加します（有効期限10分）。</p>
      <input id="code" class="url-input join-input" placeholder="例: 123456" maxlength="64" autocomplete="off" inputmode="numeric" />
      <button id="joinBtn" class="action-button btn--block" disabled>参加する</button>
      <a href="/" class="page-back">← トップへ戻る</a>
      <div id="status" class="page-status"></div>
    </div>
  </div>
  <script type="module" src="./js/pages/join.js"></script>
</body>
</html>
