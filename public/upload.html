<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffb300">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <title>送信 - シェアっと</title>
  <script>
    (function () {
      var sid = new URLSearchParams(location.search).get('session');
      if (sid && sid.length >= 6) document.documentElement.classList.add('qr-session');
    })();
  </script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/app-layout.css">
  <link rel="stylesheet" href="css/three-ui.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Liquid Glass Components */
    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.1),
        0 4px 16px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      max-width: 600px;
      margin: 20px auto;
    }
    
    .glass-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.6), 
        transparent);
      animation: shimmer 3s linear infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    /* 認証システム用スタイル */
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .auth-container {
      background: rgba(255, 255, 255, 0.15);
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 32px;
      padding: 48px;
      box-shadow: 
        0 16px 64px rgba(0, 0, 0, 0.2),
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      text-align: center;
      max-width: 90%;
      width: 420px;
      position: relative;
      overflow: hidden;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .auth-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, 
        transparent, 
        rgba(255, 255, 255, 0.1), 
        transparent 120deg);
      animation: rotate 8s linear infinite;
    }
    
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }
    
    .auth-title {
      font-size: 28px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff, #f0f0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    
    .auth-subtitle {
      font-size: 16px;
      margin-bottom: 32px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    
    .auth-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      font-size: 16px;
      color: white;
      margin-bottom: 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    .auth-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .auth-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }
    
    .auth-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.2), 
        rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    
    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
    }
    
    .auth-error {
      display: none;
      color: #ff6b6b;
      margin-top: 16px;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }
    
    .auth-info {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
      z-index: 1;
    }
    
    .main-content {
      display: none;
      padding: 20px;
    }
    
    .main-content.authenticated {
      display: block;
    }

    html.qr-session #authOverlay {
      display: none !important;
    }

    html.qr-session #mainContent.main-content {
      display: block;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #111111;
    }
    
    .header p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }
    
    /* Tab Container */
    .tab-container {
      display: flex;
      margin-bottom: 32px;
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .tab-button {
      flex: 1;
      padding: 16px 12px;
      background: transparent;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      color: rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
    }
    
    .tab-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, 
        rgba(255, 255, 255, 0.15), 
        rgba(255, 255, 255, 0.05));
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .tab-button.active {
      color: white;
      transform: scale(1.05);
    }
    
    .tab-button.active::before {
      opacity: 1;
    }
    
    .tab-button:not(.active):hover {
      color: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Upload Area */
    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.05);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .upload-area:hover, .upload-area.dragover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.1);
    }
    
    .upload-icon {
      font-size: 64px;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.6);
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
    
    .upload-area p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      line-height: 1.5;
    }
    
    .file-input {
      display: none;
    }
    
    /* File Preview */
    .file-preview {
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    
    .file-name {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-all;
    }
    
    .file-size {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    
    /* Progress Bar */
    .progress-container {
      display: none;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    /* Buttons */
    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      width: 100%;
      margin: 10px 0;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, 
        rgba(79, 172, 254, 0.8), 
        rgba(0, 242, 254, 0.8));
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Status */
    .status {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }
    
    .status.success {
      color: #4ade80;
    }
    
    .status.error {
      color: #f87171;
    }
    
    /* Mobile sticky action button */
    @media (max-width: 768px) {
      .btn-sticky { 
        position: fixed; 
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom)); 
        width: auto;
        z-index: 110;
      }
      .main-content { padding-bottom: 180px; }
      .url-input-container { margin-bottom: 160px; }
      .status { margin-bottom: 140px; }
      #url-status { margin-bottom: 140px; }
    }
    
    /* URL Input */
    .url-input-container {
      margin: 20px 0;
    }
    
    .url-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      font-size: 16px;
      color: white;
      margin-bottom: 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .url-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }
    
    .url-preview {
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    
    .url-preview.show {
      display: block;
    }
    
    .url-preview-title {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .url-preview-description {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    
    .url-preview-url {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      word-break: break-all;
      font-family: monospace;
    }

    /* File preview readability */
    .file-preview .file-name,
    .file-preview .file-size { color: #111; }
    .file-preview { margin-bottom: 12px; }
    
    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    
    .footer small {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
      display: block;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .glass-container {
        margin: 10px;
        padding: 24px;
      }
      
      .header h1 {
        font-size: 32px;
      }
      
      .auth-container {
        padding: 32px 24px;
        width: 95%;
      }
      
      .upload-area {
        padding: 40px 20px;
      }
      
      .upload-icon {
        font-size: 48px;
      }
      
      .tab-button {
        font-size: 14px;
        padding: 12px 8px;
      }
    }
  /* Apple-like design tokens and overrides */
  :root {
    --accent: #0a84ff;
    --accent-pressed: #0066cc;
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.72);
    --border: rgba(255, 255, 255, 0.16);
    --border-strong: rgba(255, 255, 255, 0.24);
    --surface: rgba(255, 255, 255, 0.10);
    --radius-lg: 20px;
    --radius-xl: 24px;
  }

  body { background: linear-gradient(180deg, #0b0f14, #11151b); color: var(--text-primary); }
  .glass-container { background: var(--surface); border-color: var(--border); border-radius: var(--radius-xl); }
  .tab-container { background: rgba(255,255,255,0.08); border-color: var(--border); }
  .tab-button.active { color: #fff; }
  .upload-area { background: rgba(255,255,255,0.05); border-color: var(--border); }
  .btn-primary { background: var(--accent); border-color: transparent; color: #fff; }
  .btn-primary:hover { background: var(--accent-pressed); }
  .url-link { color: var(--accent); }
  </style>
  <!-- Material theme overrides: fixed light scheme across pages -->
  <style>
    :root { --md-bg:#f6f7f9; --md-surface:#ffffff; --md-surface-variant:#f2f4f7; --md-outline:#d0d7e2; --md-outline-variant:#e3e8f1; --md-on-bg:#111111; --md-on-surface:#111111; --md-on-surface-variant:#4a5568; --md-primary:#ffb300; --md-primary-pressed:#ff8f00; }
    body { background: var(--md-bg) !important; color: var(--md-on-bg); color-scheme: light; }
    .glass-container { background: var(--md-surface) !important; border:1px solid var(--md-outline-variant) !important; }
    .tab-container { background: var(--md-surface-variant) !important; border:1px solid var(--md-outline) !important; }
    .action-button, .btn, .auth-button, .download-btn { background: var(--md-primary) !important; color:#fff !important; border-color: transparent !important; }
    .btn:hover, .download-btn:hover, .auth-button:hover { background: var(--md-primary-pressed) !important; }
    .upload-area { background: var(--md-surface) !important; border-color: var(--md-outline) !important; }
    .header h1, .files-header h3 { color: var(--md-on-surface) !important; }
    .file-item, .url-item { background: var(--md-surface-variant) !important; border:1px solid var(--md-outline) !important; }
    .header p, .file-meta, .file-size, .file-date, .status { color: var(--md-on-surface-variant) !important; }
    /* URL preview colors for light background */
    .url-preview { background: var(--md-surface-variant) !important; border:1px solid var(--md-outline) !important; }
    .url-preview-title { color: var(--md-on-surface) !important; }
    .url-preview-description { color: var(--md-on-surface-variant) !important; }
    .url-preview-url { color: var(--md-on-surface) !important; }
  </style>
  <style>
  :root {
    --bg-start: var(--md-bg); --bg-end: var(--md-bg); --surface: var(--md-surface);
    --border: var(--md-outline-variant); --border-strong: var(--md-outline);
    --text-primary: var(--md-on-surface); --text-secondary: var(--md-on-surface-variant);
    --accent: var(--md-primary); --accent-pressed: var(--md-primary-pressed);
    --radius-lg: 16px; --radius-xl: 24px;
  }
  body { background: linear-gradient(180deg, var(--bg-start), var(--bg-end)); color: var(--text-primary); }
  .glass-container { background: var(--surface); border-color: var(--border); border-radius: var(--radius-xl); }
  .tab-container { background: var(--surface); border-color: var(--border); }
  .tab-button { color: var(--text-secondary); }
  .tab-button.active { color: var(--text-primary); }
  .upload-area { background: rgba(0,0,0,0.02); border-color: var(--border); }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; min-height: 44px; border-radius: var(--radius-lg); }
  .btn-primary:hover { background: var(--accent-pressed); }
  .url-input { background: var(--surface); border-color: var(--border); color: var(--text-primary); }
  .url-input::placeholder { color: var(--text-secondary); }
  .url-input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 4px rgba(10,132,255,.15); }
  </style>
</head>
<body>
  <!-- 認証オーバーレイ -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-container">
      <h2 class="auth-title">📱 シェアっと</h2>
      <p class="auth-subtitle">6桁の参加コードを入力してください</p>
      <input type="text" inputmode="numeric" id="authInput" class="auth-input" placeholder="例: 123456" maxlength="64" autocomplete="off" />
      <a href="/join.html" class="auth-button" style="display:block;margin-top:12px;text-align:center;text-decoration:none;background:var(--md-surface-variant)!important;color:var(--md-on-surface)!important">🧩 参加専用ページへ</a>
      <button onclick="submitJoinCode()" class="auth-button">参加する</button>
      <div id="authError" class="auth-error">参加コードが正しくありません</div>
      <div class="auth-info">💡 QRコードからアクセスした場合、<br>自動的に認証されます</div>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="mainContent" class="main-content mobile-shell">
    <div class="mobile-status-bar">
      <div id="mobile-scene-bg" class="mobile-scene-bg" aria-hidden="true"></div>
      <div class="connection-panel" style="margin-bottom:8px">
        <span id="mobileConnectionBadge" class="connection-badge" data-state="idle">準備中</span>
        <span id="mobileConnectionDetail" class="connection-detail"></span>
      </div>
      <button type="button" id="fallbackRelayBtn" class="btn btn-primary" hidden style="margin-bottom:8px;width:100%">☁️ サーバー経由に切り替え</button>
      <a href="/" style="color:var(--md-primary);text-decoration:none;font-size:14px">← PC画面へ戻る</a>
    </div>

    <header style="text-align:center;margin-bottom:20px">
      <h1 style="font-size:1.75rem;font-weight:800;margin:0">送信</h1>
      <p style="font-size:14px;color:var(--md-on-surface-variant);margin-top:6px">写真・動画・ファイルをPCへ送る</p>
    </header>

    <div class="panel-card">
      <!-- タブ切り替え -->
      <div class="tab-container">
        <button class="tab-button active" data-tab="file">📁 ファイル</button>
        <button class="tab-button" data-tab="url">🔗 URL</button>
        <button class="tab-button" data-tab="text">💬 テキスト</button>
      </div>

      <!-- ファイルアップロードタブ -->
      <div class="tab-content active" id="file-tab">
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">+</div>
          <p>タップしてファイルを選択<br>または<br>ファイルをドラッグ＆ドロップ</p>
          <input type="file" id="file-input" class="file-input" accept="image/*,video/*,*/*" multiple>
        </div>
        
        <div class="file-preview" id="file-preview">
          <div class="file-name" id="file-name"></div>
          <div class="file-size" id="file-size"></div>
        </div>
        
        <div class="progress-container" id="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
        </div>
        
        <button class="btn btn-primary btn-sticky" id="upload-btn" disabled>アップロード</button>
        
        <div class="status" id="status"></div>
      </div>
      
      <!-- URL共有タブ -->
      <div class="tab-content" id="url-tab">
        <div class="url-input-container">
          <input 
            type="url" 
            id="url-input" 
            class="url-input" 
            placeholder="https://example.com のようにURLを入力してください"
          >
          
          <div class="url-preview" id="url-preview">
            <div class="url-preview-title" id="url-preview-title"></div>
            <div class="url-preview-description" id="url-preview-description"></div>
            <div class="url-preview-url" id="url-preview-url"></div>
          </div>
        </div>
        
        <div class="progress-container" id="url-progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="url-progress-bar"></div>
          </div>
        </div>
        
        <button class="btn btn-primary btn-sticky" id="url-share-btn" disabled>URLを共有</button>
        
        <div class="status" id="url-status"></div>
      </div>

      <!-- テキスト送信タブ（直接接続時） -->
      <div class="tab-content" id="text-tab">
        <textarea id="text-input" class="url-input" rows="4" placeholder="送りたいテキストを入力"></textarea>
        <button class="btn btn-primary btn-sticky" id="text-send-btn">テキストを送信</button>
      </div>
    </div>

    <div class="panel-card" id="mobileReceivePanel" hidden style="margin-top:20px">
      <h3 style="margin-bottom:12px;font-size:1.1rem">📥 PCから受信</h3>
      <div id="mobileReceiveList" class="files-list">
        <div class="no-files">PCから届いたファイル・テキストがここに表示されます</div>
      </div>
    </div>

    <div class="footer" style="margin-top:24px;text-align:center;font-size:13px">
      シェアっと · Develop by YUKI KONDO
    </div>
  </div>

  <script type="module" src="./js/pages/mobile-upload.js"></script>
</body>
</html>
